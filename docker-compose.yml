services:
  # Note: Neo4j runs on Neo4j Aura (cloud) -- see GTMDB_NEO4J_URI in .env
  # No local Neo4j service needed.

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: gtmdb
      CLICKHOUSE_USER: dev
      CLICKHOUSE_PASSWORD: devpassword
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clickhouse-data:
